<!DOCTYPE html>
<html>
<head>
    <title>Wisdom Quotes</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{font-family:'Poppins',sans-serif;}

        .page{
            height:100vh;
            padding:80px 50px;
            background:url("bg5.jpeg") no-repeat center/cover;
            text-align:center;
            position:relative;
        }

        .navbar{
            display:flex;
            justify-content:center;
            padding:20px;
        }

        .logo{
            font-weight:600;
            font-size:22px;
        }

        .back-btn{
            position:absolute;
            top:20px;
            left:20px;
            border:none;
            background:none;
            font-size:18px;
            cursor:pointer;
        }

        .hero h1{font-size:48px;margin-bottom:10px;}
        .hero p{margin-bottom:40px;color:#444;}

        .quotes-container{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:30px;
            max-width:900px;
            margin:auto;
        }

        .card{
            background:rgba(255,255,255,0.3);
            padding:30px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            transition:0.3s;
        }

        .card:hover{transform:translateY(-10px);}
        .card p{color:#333;}
        .card h4{color:purple;}
    </style>
</head>

<body>

<section class="page">

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<nav class="navbar">
    <div class="logo">● QuoteSpark</div>
</nav>

<div class="hero">
    <h1>🌿 Wisdom Quotes</h1>
    <p>Timeless truths that guide your life.</p>
</div>

<div class="quotes-container">

    <div class="card">
        <p>Knowing yourself is the beginning of all wisdom.</p>
        <h4>— Aristotle</h4>
    </div>

    <div class="card">
        <p>Turn your wounds into wisdom.</p>
        <h4>— Oprah Winfrey</h4>
    </div>

    <div class="card">
        <p>Wisdom begins in wonder.</p>
        <h4>— Socrates</h4>
    </div>

    <div class="card">
        <p>The only true wisdom is knowing you know nothing.</p>
        <h4>— Socrates</h4>
    </div>

</div>

</section>

<script>
function goBack(){
    
        window.location.href = "trial.html#explore";
    
}
</script>

</body>
</html>
